<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - Sistema ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0d1117; color:#c9d1d9; font-family:'Segoe UI',sans-serif; padding:30px; }

        .top-bar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:28px;
        }

        .top-left {
            display:flex;
            align-items:center;
            gap:12px;
        }

        .top-left i { color:#58a6ff; font-size:1.4rem; }
        .top-left h1 { color:#f0f6fc; font-size:1.5rem; font-weight:800; }

        .top-right { display:flex; gap:10px; }

        .btn {
            text-decoration:none;
            padding:9px 18px;
            border-radius:8px;
            font-weight:700;
            font-size:.88rem;
            cursor:pointer;
            border:none;
            transition:.2s;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }

        .btn-add    { background:#238636; color:white; }
        .btn-add:hover  { background:#2ea043; }
        .btn-back   { background:#21262d; color:#c9d1d9; }
        .btn-back:hover { background:#30363d; }

        /* Alerts */
        .alert {
            padding:12px 16px;
            border-radius:10px;
            margin-bottom:18px;
            font-size:.88rem;
            display:flex;
            align-items:center;
            gap:10px;
        }
        .alert-success { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.3); color:#3fb950; }
        .alert-error   { background:rgba(248,81,73,.12);  border:1px solid rgba(248,81,73,.3);  color:#f85149; }

        /* Table */
        .table-card {
            background:#161b22;
            border:1px solid #21262d;
            border-radius:14px;
            overflow:hidden;
        }

        table { width:100%; border-collapse:collapse; }
        thead { background:#0d1117; }

        th {
            text-align:left;
            padding:13px 16px;
            color:#8b949e;
            font-size:.73rem;
            text-transform:uppercase;
            letter-spacing:.06em;
        }

        td {
            padding:13px 16px;
            border-top:1px solid #21262d;
            font-size:.88rem;
        }

        tr:hover td { background:rgba(255,255,255,.02); }

        .nombre { color:#f0f6fc; font-weight:700; }

        .badge {
            padding:4px 11px;
            border-radius:30px;
            font-size:.72rem;
            font-weight:700;
            display:inline-flex;
            align-items:center;
            gap:4px;
        }
        .badge-admin { background:rgba(88,166,255,.15); color:#58a6ff; }
        .badge-comun { background:rgba(63,185,80,.15);  color:#3fb950; }
        .badge-none  { background:rgba(139,148,158,.1); color:#8b949e; }

        .actions { display:flex; gap:7px; }

        .btn-edit   { background:#1f6feb; color:white; padding:5px 12px; border-radius:7px; font-size:.8rem; font-weight:700; }
        .btn-delete { background:#da3633; color:white; padding:5px 12px; border-radius:7px; font-size:.8rem; font-weight:700; border:none; cursor:pointer; text-decoration:none; }
        .btn-edit:hover   { background:#388bfd; }
        .btn-delete:hover { background:#f85149; }

        .empty {
            text-align:center;
            padding:50px;
            color:#8b949e;
        }
        .empty i { font-size:2.5rem; display:block; margin-bottom:10px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="top-left">
        <i class="bi bi-people-fill"></i>
        <h1>Clientes</h1>
    </div>
    <div class="top-right">
        <a th:href="@{/dashboard}" class="btn btn-back">
            <i class="bi bi-arrow-left"></i> Regresar
        </a>
        <a th:href="@{/clientes/nuevo}" class="btn btn-add">
            <i class="bi bi-person-plus-fill"></i> Agregar Cliente
        </a>
    </div>
</div>

<div th:if="${mensaje}" class="alert alert-success">
    <i class="bi bi-check-circle-fill"></i>
    <span th:text="${mensaje}"></span>
</div>
<div th:if="${error}" class="alert alert-error">
    <i class="bi bi-exclamation-triangle-fill"></i>
    <span th:text="${error}"></span>
</div>

<div class="table-card">
    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Documento</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Dirección</th>
                <th>Tipo</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(clientes)}">
                <td colspan="8">
                    <div class="empty">
                        <i class="bi bi-people"></i>
                        No hay clientes registrados.
                    </div>
                </td>
            </tr>
            <tr th:each="c, iter : ${clientes}">
                <td th:text="${iter.count}"></td>
                <td class="nombre" th:text="${c.nombre}"></td>
                <td th:text="${c.documento != null ? c.documento : '—'}"></td>
                <td th:text="${c.telefono != null ? c.telefono : '—'}"></td>
                <td th:text="${c.correo != null ? c.correo : '—'}"></td>
                <td th:text="${c.direccion != null ? c.direccion : '—'}"></td>
                <td>
                    <span th:if="${c.tipoCliente == 'Administrador'}" class="badge badge-admin">
                        <i class="bi bi-shield-fill"></i> Administrador
                    </span>
                    <span th:if="${c.tipoCliente == 'Comun'}" class="badge badge-comun">
                        <i class="bi bi-person-fill"></i> Común
                    </span>
                    <span th:if="${c.tipoCliente == null or c.tipoCliente == ''}" class="badge badge-none">
                        Sin tipo
                    </span>
                </td>
                <td>
                    <div class="actions">
                        <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn btn-edit">
                            <i class="bi bi-pencil-fill"></i> Editar
                        </a>
                        <a th:href="@{/clientes/eliminar/{id}(id=${c.id})}"
                           class="btn btn-delete"
                           onclick="return confirm('¿Eliminar este cliente?')">
                            <i class="bi bi-trash-fill"></i> Eliminar
                        </a>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
