<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0d1117;
            color:#c9d1d9;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
        }
        .error-card {
            background:#161b22;
            border:1px solid #21262d;
            border-radius:18px;
            padding:50px 60px;
            text-align:center;
            max-width:500px;
        }
        .error-icon { font-size:4rem; color:#f85149; margin-bottom:20px; }
        .error-code { font-size:5rem; font-weight:900; color:#f85149; line-height:1; }
        .error-title { color:#f0f6fc; font-size:1.4rem; margin:15px 0 10px; }
        .error-msg { color:#8b949e; font-size:.95rem; margin-bottom:30px; }
        .btn-home {
            text-decoration:none;
            background:#238636;
            color:white;
            padding:12px 28px;
            border-radius:10px;
            font-weight:700;
            transition:.2s;
            display:inline-flex;
            align-items:center;
            gap:8px;
        }
        .btn-home:hover { background:#2ea043; }
    </style>
</head>
<body>
<div class="error-card">
    <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <div class="error-code" th:text="${status}">500</div>
    <div class="error-title">Algo salió mal</div>
    <div class="error-msg" th:text="${message}">Ha ocurrido un error inesperado.</div>
    <a href="/dashboard" class="btn-home">
        <i class="bi bi-house-fill"></i> Volver al inicio
    </a>
</div>
</body>
</html>
