<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturación - Sistema ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0d1117;
            color:#c9d1d9;
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
        }

        .topbar{
            background:#161b22;
            border-bottom:1px solid #21262d;
            padding:1rem 1.5rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .topbar-title{
            color:#f0f6fc;
            font-size:1rem;
            font-weight:700;
            display:flex;
            align-items:center;
            gap:.5rem;
        }

        .topbar-title i{
            color:#3fb950;
        }

        .topbar-actions{
            display:flex;
            gap:.6rem;
        }

        .btn-primary{
            background:#1d6b2d;
            border:1px solid rgba(63,185,80,.3);
            color:#3fb950;
            padding:.55rem 1rem;
            border-radius:8px;
            text-decoration:none;
            font-size:.85rem;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:.45rem;
            transition:.2s;
        }

        .btn-primary:hover{
            background:#238636;
            color:#56d364;
        }

        .btn-secondary{
            background:#161b22;
            border:1px solid #30363d;
            color:#8b949e;
            padding:.55rem 1rem;
            border-radius:8px;
            text-decoration:none;
            font-size:.85rem;
            font-weight:600;
            display:flex;
            align-items:center;
            gap:.45rem;
            transition:.2s;
        }

        .btn-secondary:hover{
            border-color:#58a6ff;
            color:#58a6ff;
        }

        .content{
            padding:1.5rem;
        }

        .alert-ok{
            background:rgba(63,185,80,.12);
            border:1px solid rgba(63,185,80,.25);
            color:#3fb950;
            padding:.9rem 1rem;
            border-radius:10px;
            margin-bottom:1rem;
        }

        .alert-err{
            background:rgba(248,81,73,.12);
            border:1px solid rgba(248,81,73,.25);
            color:#f85149;
            padding:.9rem 1rem;
            border-radius:10px;
            margin-bottom:1rem;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
            gap:1rem;
            margin-bottom:1.5rem;
        }

        .stat-card{
            background:#161b22;
            border:1px solid #21262d;
            border-radius:12px;
            padding:1.2rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .stat-label{
            color:#6e7681;
            font-size:.72rem;
            text-transform:uppercase;
            font-weight:700;
            letter-spacing:1px;
            margin-bottom:.35rem;
        }

        .stat-value{
            font-size:1.6rem;
            font-weight:800;
            color:#f0f6fc;
        }

        .stat-green{
            color:#3fb950;
        }

        .stat-icon{
            width:45px;
            height:45px;
            border-radius:10px;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:1.2rem;
        }

        .table-card{
            background:#161b22;
            border:1px solid #21262d;
            border-radius:12px;
            overflow:hidden;
        }

        .table-header{
            padding:1rem 1.2rem;
            border-bottom:1px solid #21262d;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .table-title{
            font-size:.9rem;
            font-weight:700;
            color:#f0f6fc;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#0d1117;
        }

        thead th{
            color:#6e7681;
            font-size:.7rem;
            text-transform:uppercase;
            letter-spacing:1px;
            padding:.9rem 1.2rem;
            text-align:left;
            border-bottom:1px solid #21262d;
        }

        tbody td{
            padding:1rem 1.2rem;
            border-bottom:1px solid #21262d;
            font-size:.87rem;
            vertical-align:top;
        }

        tbody tr:hover{
            background:rgba(255,255,255,.02);
        }

        .venta-numero{
            color:#58a6ff;
            font-weight:700;
        }

        .cliente{
            color:#f0f6fc;
            font-weight:600;
        }

        .producto-lista{
            display:flex;
            flex-direction:column;
            gap:.45rem;
        }

        .producto-item{
            background:rgba(63,185,80,.08);
            border:1px solid rgba(63,185,80,.18);
            color:#3fb950;
            border-radius:8px;
            padding:.45rem .7rem;
            font-size:.8rem;
            font-weight:600;
            width:fit-content;
        }

        .fecha{
            color:#8b949e;
        }

        .total{
            color:#3fb950;
            font-weight:800;
        }

        .badge-ok{
            background:rgba(63,185,80,.12);
            border:1px solid rgba(63,185,80,.25);
            color:#3fb950;
            border-radius:20px;
            padding:.25rem .7rem;
            font-size:.72rem;
            font-weight:700;
            display:inline-flex;
            align-items:center;
            gap:.3rem;
        }

        .btn-delete{
            background:rgba(248,81,73,.1);
            border:1px solid rgba(248,81,73,.2);
            color:#f85149;
            padding:.45rem .75rem;
            border-radius:8px;
            text-decoration:none;
            font-size:.8rem;
            font-weight:600;
            display:inline-flex;
            align-items:center;
            gap:.35rem;
            transition:.2s;
        }

        .btn-delete:hover{
            background:rgba(248,81,73,.18);
            color:#ff7b72;
        }

        .empty{
            text-align:center;
            padding:3rem;
            color:#6e7681;
        }

        @media(max-width:900px){

            .topbar{
                flex-direction:column;
                gap:1rem;
                align-items:flex-start;
            }

            .topbar-actions{
                width:100%;
                flex-wrap:wrap;
            }

            table{
                min-width:900px;
            }

            .table-card{
                overflow-x:auto;
            }
        }
    </style>
</head>

<body>

<div class="topbar">

    <div class="topbar-title">
        <i class="bi bi-receipt-cutoff"></i>
        Historial de Facturación
    </div>

    <div class="topbar-actions">

        <a th:href="@{/ventas/nueva}" class="btn-primary">
            <i class="bi bi-plus-circle-fill"></i>
            Nueva Factura
        </a>

        <a th:href="@{/dashboard}" class="btn-secondary">
            <i class="bi bi-arrow-left"></i>
            Regresar
        </a>

    </div>
</div>

<div class="content">

    <div th:if="${successMsg}" class="alert-ok">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMsg}"></span>
    </div>

    <div th:if="${errorMsg}" class="alert-err">
        <i class="bi bi-x-circle-fill"></i>
        <span th:text="${errorMsg}"></span>
    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <div>
                <div class="stat-label">Facturas Registradas</div>

                <div class="stat-value"
                     th:text="${#lists.size(listaVentas)}">
                    0
                </div>
            </div>

            <div class="stat-icon"
                 style="background:rgba(56,139,253,.1); color:#58a6ff;">
                <i class="bi bi-receipt"></i>
            </div>

        </div>

        <div class="stat-card">

            <div>
                <div class="stat-label">Ingresos Totales</div>

                <div class="stat-value stat-green">
                    $
                    <span th:text="${#numbers.formatDecimal(totalIngresos,1,2)}">
                        0
                    </span>
                </div>
            </div>

            <div class="stat-icon"
                 style="background:rgba(63,185,80,.1); color:#3fb950;">
                <i class="bi bi-cash-stack"></i>
            </div>

        </div>

    </div>

    <div class="table-card">

        <div class="table-header">
            <div class="table-title">
                Ventas Registradas
            </div>
        </div>

        <table>

            <thead>
            <tr>
                <th>#</th>
                <th>Cliente</th>
                <th>Productos</th>
                <th>Fecha</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:if="${#lists.isEmpty(listaVentas)}">
                <td colspan="7" class="empty">

                    <i class="bi bi-receipt"
                       style="font-size:2rem;display:block;margin-bottom:.8rem;">
                    </i>

                    No hay facturas registradas

                </td>
            </tr>

            <tr th:each="v,iter : ${listaVentas}">

                <!-- NUMERO VISUAL -->
                <td class="venta-numero"
                    th:text="${iter.count}">
                    1
                </td>

                <td class="cliente"
                    th:text="${v.cliente.nombre}">
                    Cliente
                </td>

                <!-- PRODUCTOS -->
                <td>

                    <div class="producto-lista">

                        <div class="producto-item"
                             th:each="d : ${v.detalles}">

                            <span th:text="${d.producto.nombre}"></span>

                            —
                            x<span th:text="${d.cantidad}"></span>

                            —
                            $

                            <span th:text="${#numbers.formatDecimal(d.precioUnitario * d.cantidad,1,2)}"></span>

                        </div>

                    </div>

                </td>

                <td class="fecha"
                    th:text="${#temporals.format(v.fecha,'dd/MM/yyyy HH:mm')}">
                    Fecha
                </td>

                <td class="total">

                    $
                    <span th:text="${#numbers.formatDecimal(v.total,1,2)}">
                        0
                    </span>

                </td>

                <td>

                    <span class="badge-ok">
                        <i class="bi bi-check-circle-fill"></i>
                        Completado
                    </span>

                </td>

                <td>

                    <a th:href="@{/ventas/eliminar/{id}(id=${v.id})}"
                       class="btn-delete"
                       onclick="return confirm('¿Eliminar esta factura?')">

                        <i class="bi bi-trash-fill"></i>
                        Eliminar

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
