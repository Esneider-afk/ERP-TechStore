<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0d1117; color:#c9d1d9; font-family:'Segoe UI',sans-serif; padding:40px 20px; }
        .container { max-width:620px; margin:auto; }

        .card { background:#161b22; border:1px solid #21262d; border-radius:18px; overflow:hidden; }

        .card-header {
            background:#0d1117;
            padding:22px 28px;
            border-bottom:1px solid #21262d;
            display:flex;
            align-items:center;
            gap:12px;
        }
        .card-header i { color:#58a6ff; font-size:1.5rem; }
        .card-header h3 { color:#f0f6fc; font-size:1.25rem; margin:0; }

        .card-body { padding:28px; }

        .form-group { margin-bottom:20px; }

        label {
            display:block;
            color:#8b949e;
            font-size:.78rem;
            margin-bottom:7px;
            font-weight:700;
            text-transform:uppercase;
            letter-spacing:.05em;
        }

        input, select {
            width:100%;
            background:#0d1117;
            border:1px solid #30363d;
            border-radius:10px;
            padding:12px 15px;
            color:#c9d1d9;
            font-size:.95rem;
            outline:none;
            transition:.2s;
        }

        input:focus, select:focus {
            border-color:#58a6ff;
            box-shadow:0 0 0 3px rgba(88,166,255,.15);
        }

        input::placeholder { color:#484f58; }
        select option { background:#161b22; color:#c9d1d9; }

        /* Selector visual de tipo cliente */
        .tipo-selector { display:flex; gap:12px; }

        .tipo-option { display:none; }

        .tipo-label {
            flex:1;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:8px;
            padding:16px;
            border:2px solid #30363d;
            border-radius:12px;
            cursor:pointer;
            transition:.2s;
            color:#8b949e;
            font-size:.88rem;
            font-weight:700;
        }
        .tipo-label i { font-size:1.8rem; }
        .tipo-label:hover { border-color:#58a6ff; color:#58a6ff; background:rgba(88,166,255,.05); }

        .tipo-option:checked + .tipo-label {
            border-color:#58a6ff;
            color:#58a6ff;
            background:rgba(88,166,255,.1);
        }

        /* Para Natural en verde */
        #tipo-natural:checked + .tipo-label {
            border-color:#3fb950;
            color:#3fb950;
            background:rgba(63,185,80,.1);
        }

        .btn-group { display:flex; gap:12px; margin-top:28px; }

        .btn {
            text-decoration:none;
            padding:13px 22px;
            border-radius:10px;
            font-weight:700;
            font-size:.95rem;
            cursor:pointer;
            border:none;
            transition:.2s;
            display:flex;
            align-items:center;
            gap:7px;
        }

        .btn-save { background:#238636; color:white; flex:1; justify-content:center; }
        .btn-save:hover { background:#2ea043; }
        .btn-back { background:#21262d; color:#c9d1d9; }
        .btn-back:hover { background:#30363d; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">

        <div class="card-header">
            <i class="bi bi-person-vcard-fill"></i>
            <h3 th:text="${cliente.id == null} ? 'Nuevo Cliente' : 'Editar Cliente'">Formulario Cliente</h3>
        </div>

        <div class="card-body">
            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label><i class="bi bi-person"></i> Nombre</label>
                    <input type="text" th:field="*{nombre}" placeholder="Nombre completo" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-card-text"></i> Documento</label>
                    <input type="text" th:field="*{documento}" placeholder="Número de documento" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-telephone"></i> Teléfono</label>
                    <input type="text" th:field="*{telefono}" placeholder="Número de teléfono" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-envelope"></i> Correo</label>
                    <input type="email" th:field="*{correo}" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label><i class="bi bi-geo-alt"></i> Dirección</label>
                    <input type="text" th:field="*{direccion}" placeholder="Dirección" required>
                </div>

                <!-- Solo cambia el bloque del selector de tipo, el resto queda igual -->
				<div class="form-group">
				    <label><i class="bi bi-tag"></i> Tipo de Cliente</label>
				    <div class="tipo-selector">
				
				        <input type="radio" id="tipo-admin" name="tipoCliente"
				               value="Administrador"
				               class="tipo-option"
				               th:checked="${cliente.tipoCliente == 'Administrador'}">
				        <label for="tipo-admin" class="tipo-label">
				            <i class="bi bi-shield-fill"></i>
				            Administrador
				        </label>
				
				        <input type="radio" id="tipo-comun" name="tipoCliente"
				               value="Comun"
				               class="tipo-option"
				               th:checked="${cliente.tipoCliente == 'Comun'}">
				        <label for="tipo-comun" class="tipo-label">
				            <i class="bi bi-person-fill"></i>
				            Común
				        </label>
				
				    </div>
				</div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-save">
                        <i class="bi bi-check-lg"></i> Guardar
                    </button>
                    <a th:href="@{/clientes/listar}" class="btn btn-back">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>

            </form>
        </div>

    </div>
</div>
</body>
</html>
