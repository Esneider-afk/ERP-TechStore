<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Sistema ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d1117; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; color: #c9d1d9; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; width: 100%; max-width: 480px; overflow: hidden; }
        .card-header { padding: 1.5rem 1.75rem 1.25rem; border-bottom: 1px solid #21262d; display: flex; align-items: center; gap: 0.75rem; }
        .header-icon { width: 38px; height: 38px; background: rgba(56,139,253,0.12); border: 1px solid rgba(56,139,253,0.2); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: #58a6ff; font-size: 1rem; flex-shrink: 0; }
        .header-text .title { font-size: 1rem; font-weight: 700; color: #f0f6fc; }
        .header-text .sub { font-size: 0.78rem; color: #6e7681; margin-top: 0.1rem; }
        .card-body { padding: 1.5rem 1.75rem; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: #8b949e; margin-bottom: 0.35rem; }
        .input-wrap { position: relative; margin-bottom: 1rem; }
        .input-wrap i { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: #484f58; font-size: 0.85rem; pointer-events: none; }
        input[type=text], input[type=email] { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #f0f6fc; font-size: 0.875rem; padding: 0.62rem 0.85rem 0.62rem 2.2rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
        input[type=text]:focus, input[type=email]:focus { border-color: #388bfd; box-shadow: 0 0 0 3px rgba(56,139,253,0.1); }
        input::placeholder { color: #484f58; }
        .card-footer { padding: 1.1rem 1.75rem; border-top: 1px solid #21262d; display: flex; flex-direction: column; gap: 0.5rem; }
        .btn-submit { background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 0.65rem; font-size: 0.875rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.45rem; transition: background 0.15s; font-family: inherit; }
        .btn-submit:hover { background: #2563eb; }
        .btn-cancel { background: none; color: #8b949e; border: 1px solid #30363d; border-radius: 8px; padding: 0.62rem; font-size: 0.875rem; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.45rem; transition: all 0.15s; }
        .btn-cancel:hover { border-color: #58a6ff; color: #58a6ff; }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <div class="header-icon"><i class="bi bi-person-vcard"></i></div>
        <div class="header-text">
            <div class="title" th:text="${cliente.id != null} ? 'Editar Cliente' : 'Registrar Cliente'">Cliente</div>
            <div class="sub">Datos del cliente para facturación</div>
        </div>
    </div>
    <div class="card-body">
        <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="POST" id="form">
            <input type="hidden" th:field="*{id}">

            <label>Nombre Completo *</label>
            <div class="input-wrap">
                <i class="bi bi-person"></i>
                <input type="text" th:field="*{nombre}" placeholder="Ej: Juan García" required>
            </div>

            <label>Documento de Identidad *</label>
            <div class="input-wrap">
                <i class="bi bi-card-text"></i>
                <input type="text" th:field="*{documento}" placeholder="Ej: 1234567890" required>
            </div>

            <label>Correo Electrónico</label>
            <div class="input-wrap">
                <i class="bi bi-envelope"></i>
                <input type="email" th:field="*{email}" placeholder="correo@ejemplo.com">
            </div>

            <label>Teléfono</label>
            <div class="input-wrap">
                <i class="bi bi-telephone"></i>
                <input type="text" th:field="*{telefono}" placeholder="3001234567">
            </div>
        </form>
    </div>
    <div class="card-footer">
        <button type="submit" form="form" class="btn-submit"><i class="bi bi-check2-circle"></i> Guardar Cliente</button>
        <a th:href="@{/clientes/listar}" class="btn-cancel"><i class="bi bi-arrow-left"></i> Cancelar</a>
    </div>
</div>
</body>
</html>
