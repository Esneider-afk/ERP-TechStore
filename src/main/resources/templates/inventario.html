<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Sistema ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d1117; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; color: #c9d1d9; }
        .topbar { background: #161b22; border-bottom: 1px solid #21262d; padding: 0.85rem 1.75rem; display: flex; justify-content: space-between; align-items: center; }
        .topbar-title { font-size: 1rem; font-weight: 700; color: #f0f6fc; display: flex; align-items: center; gap: 0.5rem; }
        .topbar-title i { color: #d29922; }
        .btn-primary { background: #1d4ed8; color: #fff; border: none; border-radius: 7px; padding: 0.5rem 1rem; font-size: 0.83rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.15s; }
        .btn-primary:hover { background: #2563eb; color: #fff; }
        .btn-secondary { background: none; color: #8b949e; border: 1px solid #30363d; border-radius: 7px; padding: 0.5rem 0.9rem; font-size: 0.83rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.15s; }
        .btn-secondary:hover { border-color: #58a6ff; color: #58a6ff; }
        .content { padding: 1.75rem; }
        .alert-ok { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.2); color: #3fb950; border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.84rem; margin-bottom: 1.25rem; }
        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat { background: #161b22; border: 1px solid #21262d; border-radius: 10px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 0.9rem; }
        .stat-icon { width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .stat-label { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #6e7681; }
        .stat-value { font-size: 1.5rem; font-weight: 800; color: #f0f6fc; line-height: 1.1; }
        .table-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; }
        .table-toolbar { padding: 0.85rem 1.25rem; border-bottom: 1px solid #21262d; }
        .table-count { font-size: 0.82rem; color: #6e7681; }
        .table-count strong { color: #c9d1d9; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #0d1117; color: #6e7681; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 0.75rem 1.25rem; border-bottom: 1px solid #21262d; white-space: nowrap; }
        tbody td { padding: 0.8rem 1.25rem; border-bottom: 1px solid #0d1117; color: #c9d1d9; font-size: 0.855rem; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .prod-icon { width: 32px; height: 32px; background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.15); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #d29922; flex-shrink: 0; }
        .prod-name { color: #f0f6fc; font-weight: 600; }
        .s-ok    { background: rgba(63,185,80,0.1); color: #3fb950; border: 1px solid rgba(63,185,80,0.2); border-radius: 20px; padding: 0.18em 0.7em; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
        .s-low   { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid rgba(210,153,34,0.2); border-radius: 20px; padding: 0.18em 0.7em; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
        .s-empty { background: rgba(248,81,73,0.1); color: #f85149; border: 1px solid rgba(248,81,73,0.2); border-radius: 20px; padding: 0.18em 0.7em; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
        .btn-edit { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid rgba(210,153,34,0.2); border-radius: 6px; padding: 0.28rem 0.65rem; font-size: 0.77rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.15s; }
        .btn-edit:hover { background: rgba(210,153,34,0.18); color: #e3b341; }
        .btn-del  { background: rgba(248,81,73,0.08); color: #f85149; border: 1px solid rgba(248,81,73,0.18); border-radius: 6px; padding: 0.28rem 0.65rem; font-size: 0.77rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.15s; margin-left: 0.3rem; }
        .btn-del:hover { background: rgba(248,81,73,0.15); color: #ff7b72; }
        .empty td { text-align: center; padding: 3rem; color: #484f58; font-size: 0.88rem; }
        @media(max-width:700px){.stats-row{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="topbar">
    <span class="topbar-title"><i class="bi bi-box-seam"></i> Inventario de Productos</span>
    <div style="display:flex;gap:0.5rem;">
        <a th:href="@{/productos/nuevo}" class="btn-primary"><i class="bi bi-plus-circle-fill"></i> Agregar Producto</a>
        <a th:href="@{/dashboard}" class="btn-secondary"><i class="bi bi-arrow-left"></i> Regresar</a>
    </div>
</div>
<div class="content">
    <div th:if="${successMsg}" class="alert-ok"><i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span></div>
    <div class="stats-row">
        <div class="stat">
            <div class="stat-icon" style="background:rgba(210,153,34,0.1);color:#d29922;"><i class="bi bi-boxes"></i></div>
            <div><div class="stat-label">Total Productos</div><div class="stat-value" th:text="${#lists.size(listaProductos)}">0</div></div>
        </div>
        <div class="stat">
            <div class="stat-icon" style="background:rgba(63,185,80,0.1);color:#3fb950;"><i class="bi bi-check2-circle"></i></div>
            <div><div class="stat-label">Con Stock</div><div class="stat-value" th:text="${#lists.size(listaProductos.?[stock > 0])}">0</div></div>
        </div>
        <div class="stat">
            <div class="stat-icon" style="background:rgba(248,81,73,0.1);color:#f85149;"><i class="bi bi-exclamation-triangle"></i></div>
            <div><div class="stat-label">Sin Stock</div><div class="stat-value" th:text="${#lists.size(listaProductos.?[stock == 0])}">0</div></div>
        </div>
    </div>
    <div class="table-card">
        <div class="table-toolbar">
            <span class="table-count">Total: <strong th:text="${#lists.size(listaProductos)}">0</strong> productos</span>
        </div>
        <table>
            <thead><tr><th>ID</th><th>Producto</th><th>Precio</th><th>Stock</th><th style="text-align:center">Acciones</th></tr></thead>
            <tbody>
                <tr class="empty" th:if="${#lists.isEmpty(listaProductos)}"><td colspan="5"><i class="bi bi-inbox" style="font-size:1.5rem;display:block;margin-bottom:0.5rem;"></i>Sin productos registrados</td></tr>
                <tr th:each="p : ${listaProductos}">
                    <td style="color:#484f58;font-weight:600;" th:text="${p.id}">1</td>
                    <td><div style="display:flex;align-items:center;gap:0.6rem;"><div class="prod-icon"><i class="bi bi-box-seam"></i></div><span class="prod-name" th:text="${p.nombre}">Prod</span></div></td>
                    <td style="color:#3fb950;font-weight:700;" th:text="'$'+${#numbers.formatDecimal(p.precio,1,2)}">$0</td>
                    <td>
                        <span th:if="${p.stock==0}" class="s-empty"><i class="bi bi-x-circle"></i> Sin stock</span>
                        <span th:if="${p.stock>0 and p.stock<=5}" class="s-low"><i class="bi bi-exclamation-triangle"></i> <span th:text="${p.stock}"></span> uds.</span>
                        <span th:if="${p.stock>5}" class="s-ok"><i class="bi bi-check-circle"></i> <span th:text="${p.stock}"></span> uds.</span>
                    </td>
                    <td style="text-align:center;">
                        <a th:href="@{/productos/editar/{id}(id=${p.id})}" class="btn-edit"><i class="bi bi-pencil-fill"></i> Editar</a>
                        <a th:href="@{/productos/eliminar/{id}(id=${p.id})}" class="btn-del" onclick="return confirm('¿Eliminar producto?')"><i class="bi bi-trash-fill"></i> Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
