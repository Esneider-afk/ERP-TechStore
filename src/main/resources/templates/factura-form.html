<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Factura - Sistema ERP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0d1117;
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
            color:#c9d1d9;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:30px;
        }

        .container{
            width:100%;
            max-width:950px;
        }

        .card{
            background:#161b22;
            border:1px solid #21262d;
            border-radius:16px;
            overflow:hidden;
            box-shadow:0 0 30px rgba(0,0,0,.25);
        }

        .header{
            padding:28px;
            border-bottom:1px solid #21262d;
            display:flex;
            align-items:center;
            gap:16px;
        }

        .header-icon{
            width:55px;
            height:55px;
            border-radius:14px;
            background:rgba(63,185,80,.12);
            color:#3fb950;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            flex-shrink:0;
        }

        .header h2{
            font-size:24px;
            color:#f0f6fc;
            margin-bottom:4px;
        }

        .header p{
            color:#8b949e;
            font-size:14px;
        }

        .body{
            padding:28px;
        }

        .alert{
            background:rgba(248,81,73,.1);
            border:1px solid rgba(248,81,73,.2);
            color:#ff7b72;
            padding:14px;
            border-radius:10px;
            margin-bottom:22px;
            font-size:14px;
        }

        label{
            display:block;
            margin-bottom:10px;
            color:#8b949e;
            font-size:14px;
            font-weight:600;
        }

        select,
        input{
            width:100%;
            background:#0d1117;
            border:1px solid #30363d;
            color:#f0f6fc;
            border-radius:12px;
            padding:13px 14px;
            font-size:14px;
            transition:.2s;
            font-family:inherit;
        }

        select:focus,
        input:focus{
            outline:none;
            border-color:#388bfd;
            box-shadow:0 0 0 3px rgba(56,139,253,.15);
        }

        .cliente-box{
            margin-bottom:28px;
        }

        .product-row{
            background:#0d1117;
            border:1px solid #21262d;
            border-radius:14px;
            padding:20px;
            margin-bottom:18px;
            transition:.2s;
        }

        .product-row:hover{
            border-color:#30363d;
        }

        .grid{
            display:grid;
            grid-template-columns:2fr 1fr 55px;
            gap:15px;
            align-items:center;
        }

        .product-row input,
        .product-row select{
            margin-bottom:0;
        }

        .btn-add{
            width:100%;
            background:#1f6feb;
            border:none;
            color:white;
            padding:15px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            font-size:14px;
            transition:.2s;
            margin-top:5px;
        }

        .btn-add:hover{
            background:#388bfd;
            transform:translateY(-1px);
        }

        .btn-remove{
            background:#da3633;
            border:none;
            color:white;
            width:45px;
            height:45px;
            border-radius:12px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:.2s;
            margin-top:28px;
            flex-shrink:0;
        }

        .btn-remove:hover{
            background:#f85149;
            transform:scale(1.05);
        }

        .footer{
            border-top:1px solid #21262d;
            padding:25px 28px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:18px;
        }

        .total{
            font-size:24px;
            font-weight:800;
            color:#3fb950;
        }

        .buttons{
            display:flex;
            gap:12px;
        }

        .btn{
            padding:13px 24px;
            border-radius:12px;
            text-decoration:none;
            font-weight:600;
            border:none;
            cursor:pointer;
            transition:.2s;
            font-size:14px;
        }

        .btn-save{
            background:#238636;
            color:white;
        }

        .btn-save:hover{
            background:#2ea043;
            transform:translateY(-1px);
        }

        .btn-cancel{
            background:#21262d;
            color:#c9d1d9;
        }

        .btn-cancel:hover{
            background:#30363d;
        }

        @media(max-width:768px){

            .grid{
                grid-template-columns:1fr;
            }

            .btn-remove{
                width:100%;
                margin-top:0;
            }

            .footer{
                flex-direction:column;
                align-items:stretch;
            }

            .buttons{
                width:100%;
                flex-direction:column;
            }

            .btn{
                width:100%;
                text-align:center;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <div class="header-icon">
                <i class="bi bi-receipt-cutoff"></i>
            </div>

            <div>
                <h2>Nueva Factura</h2>
                <p>Registrar múltiples productos y cantidades</p>
            </div>

        </div>

        <form th:action="@{/ventas/guardar}" method="post">

            <div class="body">

                <div th:if="${errorMsg}" class="alert">
                    <span th:text="${errorMsg}"></span>
                </div>

                <div class="cliente-box">

                    <label>Cliente</label>

                    <select name="clienteId" required>

                        <option value="">Selecciona un cliente</option>

                        <option th:each="c : ${listaClientes}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>

                </div>

                <div id="productos-container">

                    <div class="product-row">

                        <div class="grid">

                            <div>

                                <label>Producto</label>

                                <select name="productoId" required>

                                    <option value="">Selecciona un producto</option>

                                    <option th:each="p : ${listaProductos}"
                                            th:value="${p.id}"
                                            th:text="${p.nombre + ' - $' + p.precio + ' (Stock: ' + p.stock + ')'}">
                                    </option>

                                </select>

                            </div>

                            <div>

                                <label>Cantidad</label>

                                <input type="number"
                                       name="cantidad"
                                       min="1"
                                       value="1"
                                       required>

                            </div>

                            <button type="button"
                                    class="btn-remove"
                                    onclick="eliminarFila(this)">

                                <i class="bi bi-trash"></i>

                            </button>

                        </div>

                    </div>

                </div>

                <button type="button"
                        class="btn-add"
                        onclick="agregarProducto()">

                    <i class="bi bi-plus-circle"></i>
                    Agregar otro producto

                </button>

            </div>

            <div class="footer">

                <div class="total">
                    Factura múltiple habilitada
                </div>

                <div class="buttons">

                    <a th:href="@{/ventas/listar}" class="btn btn-cancel">
                        Cancelar
                    </a>

                    <button type="submit" class="btn btn-save">
                        Generar Factura
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>

<script>

function agregarProducto(){

    const container = document.getElementById('productos-container');

    const fila = document.querySelector('.product-row');

    const clon = fila.cloneNode(true);

    clon.querySelectorAll('input').forEach(input=>{
        input.value = 1;
    });

    clon.querySelectorAll('select').forEach(select=>{
        select.selectedIndex = 0;
    });

    container.appendChild(clon);
}

function eliminarFila(btn){

    const filas = document.querySelectorAll('.product-row');

    if(filas.length > 1){

        btn.closest('.product-row').remove();
    }
}

</script>

</body>
</html>
