<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Sistema ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d1117; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; color: #c9d1d9; }
        .topbar { background: #161b22; border-bottom: 1px solid #21262d; padding: 0.85rem 1.75rem; display: flex; justify-content: space-between; align-items: center; }
        .topbar-title { font-size: 1rem; font-weight: 700; color: #f0f6fc; display: flex; align-items: center; gap: 0.5rem; }
        .topbar-title i { color: #58a6ff; }
        .btn-primary { background: #1d4ed8; color: #fff; border: none; border-radius: 7px; padding: 0.5rem 1rem; font-size: 0.83rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: background 0.15s; }
        .btn-primary:hover { background: #2563eb; color: #fff; }
        .btn-secondary { background: none; color: #8b949e; border: 1px solid #30363d; border-radius: 7px; padding: 0.5rem 0.9rem; font-size: 0.83rem; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: all 0.15s; }
        .btn-secondary:hover { border-color: #58a6ff; color: #58a6ff; }
        .content { padding: 1.75rem; }
        .alert-ok { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.2); color: #3fb950; border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.84rem; margin-bottom: 1.25rem; }
        .table-card { background: #161b22; border: 1px solid #21262d; border-radius: 10px; overflow: hidden; }
        .table-toolbar { padding: 0.85rem 1.25rem; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .table-count { font-size: 0.82rem; color: #6e7681; }
        .table-count strong { color: #c9d1d9; }
        .search { background: #0d1117; border: 1px solid #30363d; border-radius: 7px; color: #c9d1d9; padding: 0.4rem 0.85rem; font-size: 0.83rem; width: 210px; font-family: inherit; outline: none; }
        .search:focus { border-color: #388bfd; }
        .search::placeholder { color: #484f58; }
        table { width: 100%; border-collapse: collapse; }
        thead th { background: #0d1117; color: #6e7681; font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 0.75rem 1.25rem; border-bottom: 1px solid #21262d; white-space: nowrap; }
        tbody td { padding: 0.8rem 1.25rem; border-bottom: 1px solid #0d1117; color: #c9d1d9; font-size: 0.855rem; vertical-align: middle; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: rgba(255,255,255,0.02); }
        .cli-icon { width: 32px; height: 32px; background: rgba(56,139,253,0.1); border: 1px solid rgba(56,139,253,0.15); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: #58a6ff; font-size: 0.85rem; flex-shrink: 0; }
        .cli-name { color: #f0f6fc; font-weight: 600; }
        .btn-edit { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid rgba(210,153,34,0.2); border-radius: 6px; padding: 0.28rem 0.65rem; font-size: 0.77rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.15s; }
        .btn-edit:hover { background: rgba(210,153,34,0.18); color: #e3b341; }
        .btn-del  { background: rgba(248,81,73,0.08); color: #f85149; border: 1px solid rgba(248,81,73,0.18); border-radius: 6px; padding: 0.28rem 0.65rem; font-size: 0.77rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem; transition: all 0.15s; margin-left: 0.3rem; }
        .btn-del:hover  { background: rgba(248,81,73,0.15); color: #ff7b72; }
        .empty td { text-align: center; padding: 3rem; color: #484f58; font-size: 0.88rem; }
    </style>
</head>
<body>
<div class="topbar">
    <span class="topbar-title"><i class="bi bi-person-lines-fill"></i> Clientes Registrados</span>
    <div style="display:flex;gap:0.5rem;">
        <a th:href="@{/clientes/nuevo}" class="btn-primary"><i class="bi bi-person-plus-fill"></i> Nuevo Cliente</a>
        <a th:href="@{/dashboard}" class="btn-secondary"><i class="bi bi-arrow-left"></i> Regresar</a>
    </div>
</div>
<div class="content">
    <div th:if="${successMsg}" class="alert-ok"><i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMsg}"></span></div>
    <div class="table-card">
        <div class="table-toolbar">
            <span class="table-count">Total: <strong th:text="${listaClientes.size()}">0</strong> clientes</span>
            <input class="search" id="s" placeholder="Buscar..." onkeyup="filtrar()">
        </div>
        <table id="t">
            <thead><tr><th>ID</th><th>Nombre</th><th>Documento</th><th>Email</th><th>Teléfono</th><th style="text-align:center">Acciones</th></tr></thead>
            <tbody>
                <tr class="empty" th:if="${#lists.isEmpty(listaClientes)}"><td colspan="6"><i class="bi bi-inbox" style="font-size:1.5rem;display:block;margin-bottom:0.5rem;"></i>Sin clientes registrados</td></tr>
                <tr th:each="c : ${listaClientes}">
                    <td style="color:#484f58;font-weight:600;" th:text="${c.id}">1</td>
                    <td><div style="display:flex;align-items:center;gap:0.6rem;"><div class="cli-icon"><i class="bi bi-person-fill"></i></div><span class="cli-name" th:text="${c.nombre}">Nombre</span></div></td>
                    <td th:text="${c.documento}">123</td>
                    <td style="color:#6e7681;" th:text="${c.email?:'—'}">email</td>
                    <td th:text="${c.telefono?:'—'}">300</td>
                    <td style="text-align:center;">
                        <a th:href="@{/clientes/editar/{id}(id=${c.id})}" class="btn-edit"><i class="bi bi-pencil-fill"></i> Editar</a>
                        <a th:href="@{/clientes/eliminar/{id}(id=${c.id})}" class="btn-del" onclick="return confirm('¿Eliminar cliente?')"><i class="bi bi-trash-fill"></i> Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<script>function filtrar(){const f=document.getElementById('s').value.toLowerCase();document.querySelectorAll('#t tbody tr:not(.empty)').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(f)?'':'none';});}</script>
</body>
</html>
