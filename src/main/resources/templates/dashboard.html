<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0d1117;
            color:#c9d1d9;
            font-family:'Segoe UI',sans-serif;
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:240px;
            background:#161b22;
            border-right:1px solid #21262d;
            display:flex;
            flex-direction:column;
        }

        .brand{
            padding:1.2rem;
            font-weight:800;
            color:#f0f6fc;
            border-bottom:1px solid #21262d;
            display:flex;
            align-items:center;
            gap:.5rem;
        }

        .nav{
            padding:1rem;
            display:flex;
            flex-direction:column;
            gap:.4rem;
        }

        .nav a{
            text-decoration:none;
            color:#8b949e;
            padding:.6rem .7rem;
            border-radius:8px;
            font-size:.88rem;
            display:flex;
            gap:.5rem;
            align-items:center;
        }

        .nav a:hover{
            background:#21262d;
            color:#f0f6fc;
        }

        .nav a.active{
            background:rgba(56,139,253,.1);
            color:#58a6ff;
        }

        .logout{
            margin-top:auto;
            padding:1rem;
        }

        .logout a{
            display:block;
            text-align:center;
            padding:.6rem;
            border:1px solid #30363d;
            border-radius:8px;
            color:#8b949e;
            text-decoration:none;
        }

        .main{
            flex:1;
            display:flex;
            flex-direction:column;
        }

        .topbar{
            background:#161b22;
            border-bottom:1px solid #21262d;
            padding:1rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .content{
            padding:1.5rem;
        }

        .stats{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:1rem;
            margin-bottom:1.5rem;
        }

        .card{
            background:#161b22;
            border:1px solid #21262d;
            border-radius:12px;
            padding:1rem;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .label{
            font-size:.7rem;
            color:#6e7681;
            text-transform:uppercase;
            font-weight:700;
        }

        .value{
            font-size:1.5rem;
            font-weight:800;
            color:#f0f6fc;
        }

        .green{ color:#3fb950; }

        .grid-2{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:1rem;
        }

        @media(max-width:900px){
            .grid-2{ grid-template-columns:1fr; }
        }

        .table-card{
            background:#161b22;
            border:1px solid #21262d;
            border-radius:12px;
            overflow:hidden;
        }

        .section-title{
            padding:1rem;
            border-bottom:1px solid #21262d;
            font-weight:700;
            color:#f0f6fc;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        thead{
            background:#0d1117;
        }

        th{
            text-align:left;
            padding:.9rem;
            font-size:.7rem;
            color:#6e7681;
            text-transform:uppercase;
        }

        td{
            padding:.9rem;
            border-top:1px solid #21262d;
            font-size:.85rem;
        }

        .cliente{ color:#f0f6fc; font-weight:600; }
        .producto{ color:#3fb950; font-weight:600; }
        .total{ color:#3fb950; font-weight:800; }

    </style>
</head>

<body>

<div class="sidebar">

    <div class="brand">
        <i class="bi bi-grid-3x3-gap-fill"></i>
        SISTEMA ERP
    </div>

    <div class="nav">

        <a class="active" th:href="@{/dashboard}">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a th:href="@{/clientes/listar}">
            <i class="bi bi-people"></i> Clientes
        </a>

        <a th:href="@{/ventas/nueva}">
            <i class="bi bi-receipt"></i> Facturar
        </a>

        <a th:href="@{/facturacion}">
            <i class="bi bi-folder"></i> Facturas
        </a>

        <a th:href="@{/inventario}">
            <i class="bi bi-box-seam"></i> Inventario
        </a>

    </div>

    <div class="logout">
        <a th:href="@{/logout}">Cerrar sesión</a>
    </div>

</div>

<div class="main">

    <div class="topbar">
        <div><b>Panel Principal</b></div>
        <div>Administrador</div>
    </div>

    <div class="content">

        <!-- STATS -->
        <div class="stats">

            <div class="card">
                <div>
                    <div class="label">Ventas</div>
                    <div class="value green"
                         th:text="${#numbers.formatDecimal(totalVentas,1,2)}">0</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <div class="label">Clientes</div>
                    <div class="value" th:text="${totalClientes}">0</div>
                </div>
            </div>

            <div class="card">
                <div>
                    <div class="label">Productos</div>
                    <div class="value" th:text="${totalProductos}">0</div>
                </div>
            </div>

        </div>

        <div class="grid-2">

            <!-- VENTAS -->
            <div class="table-card">

                <div class="section-title">Ventas Recientes</div>

                <table>
                    <thead>
                    <tr>
                        <th>#</th>
                        <th>Cliente</th>
                        <th>Productos</th>
                        <th>Total</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="v,iter : ${ultimasVentas}">
                        <td th:text="${iter.count}"></td>

                        <td class="cliente" th:text="${v.cliente.nombre}"></td>

                        <td class="producto">
                            <span th:each="d : ${v.detalles}">
                                <span th:text="${d.producto.nombre}"></span>
                                x<span th:text="${d.cantidad}"></span>
                                &nbsp;
                            </span>
                        </td>

                        <td class="total"
                            th:text="'$'+${#numbers.formatDecimal(v.total,1,2)}"></td>
                    </tr>

                    </tbody>
                </table>

            </div>

            <!-- INVENTARIO (SOLO FIX DE CENTRADO) -->
            <div class="table-card">

                <div class="section-title">Inventario de Productos</div>

                <div style="padding:1rem; display:flex; flex-direction:column; gap:.7rem;">

                    <div th:if="${#lists.isEmpty(productos)}"
                         style="text-align:center;color:#6e7681;padding:1rem;">
                        No hay productos registrados
                    </div>

                    <div th:each="p : ${productos}"
                         style="
                            background:#0d1117;
                            border:1px solid #21262d;
                            border-radius:10px;
                            padding:1rem;
                            display:grid;
                            grid-template-columns: 1fr 120px 120px;
                            align-items:center;
                         ">

                        <div>
                            <div style="color:#f0f6fc;font-weight:700;"
                                 th:text="${p.nombre}"></div>

                            <div style="font-size:.75rem;color:#6e7681;">
                                ID: <span th:text="${p.id}"></span>
                            </div>
                        </div>

                        <!-- STOCK CENTRADO PERFECTO -->
                        <div style="text-align:center;">
                            <div style="font-size:.7rem;color:#6e7681;">STOCK</div>
                            <div style="color:#58a6ff;font-weight:800;font-size:1.1rem;">
                                <span th:text="${p.stock}">0</span>
                            </div>
                        </div>

                        <div style="text-align:right;">
                            <div style="font-size:.7rem;color:#6e7681;">PRECIO</div>
                            <div style="color:#3fb950;font-weight:800;">
                                $<span th:text="${p.precio}">0</span>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
