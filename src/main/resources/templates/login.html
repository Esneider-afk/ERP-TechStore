<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container{
            width: 100%;
            max-width: 420px;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .title{
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .subtitle{
            text-align: center;
            color: gray;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-label{
            font-weight: 600;
            color: #495057;
        }

        .form-control{
            height: 50px;
            border-radius: 10px;
        }

        .form-control:focus{
            border-color: #1e3c72;
            box-shadow: 0 0 0 0.2rem rgba(30,60,114,0.25);
        }

        .btn-login{
            background-color: #1e3c72;
            border: none;
            height: 50px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-login:hover{
            background-color: #2a5298;
        }

        .alert{
            border-radius: 10px;
        }

    </style>
</head>

<body>

<div class="login-container">

    <div class="title">
        TechStore
    </div>

    <div class="subtitle">
        MÓDULO DE SEGURIDAD
    </div>

    <!-- Mensaje de error -->
    <div th:if="${param.error}" class="alert alert-danger text-center">
        Usuario o contraseña incorrectos
    </div>

    <!-- Mensaje logout -->
    <div th:if="${param.logout}" class="alert alert-success text-center">
        Sesión cerrada correctamente
    </div>

    <!-- FORMULARIO -->
    <form th:action="@{/procesar-login}" method="POST">

        <div class="mb-3">
            <label class="form-label">
                Usuario
            </label>

            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Ingrese su usuario"
                   required>
        </div>

        <div class="mb-4">
            <label class="form-label">
                Contraseña
            </label>

            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Ingrese su contraseña"
                   required>
        </div>

        <button type="submit"
                class="btn btn-primary btn-login w-100">

            Ingresar al Sistema

        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
