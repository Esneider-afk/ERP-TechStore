<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - TechStore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(30,100,200,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30,100,200,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .card {
            background: #161b22;
            border: 1px solid #21262d;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 800;
            color: #f0f6fc;
            letter-spacing: 0.5px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.78rem;
            color: #6e7681;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #21262d;
            margin-bottom: 1.75rem;
        }

        .alert-err {
            background: rgba(248,81,73,0.1);
            border: 1px solid rgba(248,81,73,0.25);
            color: #ff7b72;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.84rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .alert-ok {
            background: rgba(63,185,80,0.1);
            border: 1px solid rgba(63,185,80,0.25);
            color: #3fb950;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            font-size: 0.84rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 0.4rem;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-wrap i {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: #484f58;
            font-size: 0.9rem;
            pointer-events: none;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: #f0f6fc;
            font-size: 0.9rem;
            padding: 0.65rem 0.9rem 0.65rem 2.4rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        input[type=text]:focus,
        input[type=password]:focus {
            border-color: #388bfd;
            box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
        }

        input::placeholder {
            color: #484f58;
        }

        .mb-lg {
            margin-bottom: 1.5rem;
        }

        .btn-submit {
            width: 100%;
            background: #1d4ed8;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.7rem;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: #2563eb;
        }

        .footer-text {
            text-align: center;
            font-size: 0.75rem;
            color: #484f58;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>

<div class="bg-grid"></div>

<div class="card">

    <div class="logo-wrap">
        <div class="logo-icon">
            <i class="bi bi-grid-3x3-gap-fill"></i>
        </div>
        <span class="logo-text">TechStore</span>
    </div>

    <div class="subtitle">
        Módulo de Acceso
    </div>

    <hr class="divider">

    <div th:if="${param.error}" class="alert-err">
        <i class="bi bi-x-circle-fill"></i>
        Usuario o contraseña incorrectos.
    </div>

    <div th:if="${param.logout}" class="alert-ok">
        <i class="bi bi-check-circle-fill"></i>
        Sesión cerrada correctamente.
    </div>

    <!-- FORMULARIO CORREGIDO -->
    <form th:action="@{/procesar-login}" method="POST">

        <div>
            <label for="username">Usuario</label>

            <div class="input-wrap">
                <i class="bi bi-person"></i>

                <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingrese su usuario"
                        required
                        autofocus>
            </div>
        </div>

        <div class="mb-lg">

            <label for="password">Contraseña</label>

            <div class="input-wrap">
                <i class="bi bi-lock"></i>

                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required>
            </div>
        </div>

        <button type="submit" class="btn-submit">
            <i class="bi bi-box-arrow-in-right"></i>
            Ingresar al Sistema
        </button>

    </form>

    <div class="footer-text">
        TechStore &copy; 2026 — Acceso restringido
    </div>

</div>

</body>
</html>
