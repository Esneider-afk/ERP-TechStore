<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Venta POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3>Punto de Venta (POS)</h3>
            <form th:action="@{/facturacion/guardar}" th:object="${factura}" method="POST">
                <div class="mb-3">
                    <label>Nombre del Cliente</label>
                    <input type="text" th:field="*{cliente}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Total a Cobrar ($)</label>
                    <input type="number" step="0.01" th:field="*{total}" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Finalizar Venta</button>
            </form>
        </div>
    </div>
</body>
</html>
