<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial de Ventas</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container py-4">
    <a th:href="@{/dashboard}" class="btn btn-secondary mb-3">⬅ Volver al Panel</a>
    <h3>Historial General de Comprobantes Emitidos</h3>

    <table class="table table-bordered mt-4">
        <thead class="table-light">
            <tr>
                <th>Código Comprobante</th>
                <th>Fecha / Hora</th>
                <th>Cliente Receptor</th>
                <th>Monto Total</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="v : ${ventas}">
                <td th:text="'FAC-' + ${v.id}"></td>
                <td th:text="${v.fecha}"></td>
                <td th:text="${v.cliente.nombre}"></td>
                <td th:text="'$' + ${v.total}" class="fw-bold text-success"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
