# Nombre de la aplicación
spring.application.name=ProyectoFinalJava

# Conexión limpia y directa a MySQL en sistema_erp
spring.datasource.url=jdbc:mysql://localhost:3306/sistema_erp?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# AL CAMBIARLO A 'none', SPRING SOLO LEERÁ LA BD Y NO VOLVERÁ A CREAR IDS RAROS (Como el 6)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=true
server.port=8080